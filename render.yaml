# Render Blueprint — deploys the NestJS API on Render's free web service tier.
# Docs: https://render.com/docs/blueprint-spec
#
# Free tier notes:
#   - Web service sleeps after 15 min of inactivity (cold start ~30s).
#   - 750 free instance-hours/month.
#   - Use Neon/Upstash for DB+Redis (Render free Postgres has 90-day expiry).

services:
  - type: web
    name: vms-api
    runtime: node
    plan: free
    rootDir: .
    # NODE_ENV=production makes npm skip devDeps by default — force them in
    # for the build step so nest/typescript/prisma CLI are available.
    buildCommand: >-
      npm install --include=dev &&
      npx prisma generate --schema=packages/database/prisma/schema.prisma &&
      npm --workspace=@vms/api run build
    startCommand: npm --workspace=@vms/api start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string in Render dashboard
      - key: REDIS_URL
        sync: false   # paste your Upstash URL in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false   # set to your Vercel web URL, e.g. https://vms-web.vercel.app
